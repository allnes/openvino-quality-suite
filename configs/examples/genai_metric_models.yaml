model_matrix:
  validated_gpu:
    default: openai-community/gpt2
    models:
      - id: openai-community/gpt2
        family: gpt2
        size: 124m
        minimal_weight_format: fp16
        non_distilled: true
        note: "Validated on an entry-level Intel integrated GPU target with OpenVINO Runtime logits metrics and OpenVINO GenAI generation."
        metrics:
          - likelihood
          - distribution_drift
          - long_context_mechanics
          - generation
          - serving
          - rag
          - agent

  requested_minimal_nondistilled:
    default: Qwen/Qwen3-0.6B
    models:
      - id: Qwen/Qwen3-0.6B
        family: qwen3
        size: 0.6b
        minimal_weight_format: int4
        non_distilled: true
        openvino_artifact: OpenVINO/Qwen3-0.6B-int4-ov
        note: "Smallest Qwen3 text-generation checkpoint from the OpenVINO GenAI supported models list."
        metrics:
          - likelihood
          - distribution_drift
          - long_context_mechanics
          - generation
          - structured_output
          - rag
          - agent
      - id: openai/gpt-oss-20b
        family: gpt_oss
        size: 20b
        minimal_weight_format: mxfp4
        non_distilled: true
        openvino_artifact: OpenVINO/gpt-oss-20b-int4-ov
        note: "Smallest official gpt-oss checkpoint; MoE with 3.6B active parameters."
        metrics:
          - likelihood
          - distribution_drift
          - long_context_mechanics
          - generation
          - structured_output
          - rag
          - agent
      - id: mistralai/Mistral-7B-Instruct-v0.3
        family: mistral
        size: 7b
        minimal_weight_format: int4
        non_distilled: true
        openvino_artifact: OpenVINO/Mistral-7B-Instruct-v0.3-int4-ov
        note: "Smallest Mistral text-generation checkpoint from the OpenVINO GenAI supported models list."
        metrics:
          - likelihood
          - distribution_drift
          - long_context_mechanics
          - generation
          - structured_output
          - rag
          - agent
      - id: google/gemma-3-270m-it
        family: gemma3
        size: 270m
        minimal_weight_format: int4
        non_distilled: true
        note: "Smallest Gemma3 instruction checkpoint from the OpenVINO GenAI supported models list."
        metrics:
          - likelihood
          - distribution_drift
          - long_context_mechanics
          - generation
          - structured_output
          - rag
          - agent

  smoke:
    default: Qwen/Qwen2.5-0.5B-Instruct
    models:
      - id: sshleifer/tiny-gpt2
        family: gpt2
        size: tiny
        metrics:
          - likelihood
          - distribution_drift
          - long_context_mechanics
          - generation_smoke
      - id: Qwen/Qwen2.5-0.5B-Instruct
        family: qwen2
        size: 0.5b
        metrics:
          - likelihood
          - distribution_drift
          - generation
          - structured_output
      - id: TinyLlama/TinyLlama-1.1B-Chat-v1.0
        family: tinyllama
        size: 1.1b
        metrics:
          - likelihood
          - generation
          - serving_smoke
      - id: microsoft/Phi-3-mini-4k-instruct
        family: phi3
        context: 4k
        metrics:
          - likelihood
          - short_context
          - structured_output

  development:
    default: Qwen/Qwen2.5-1.5B-Instruct
    models:
      - id: Qwen/Qwen2.5-1.5B-Instruct
        family: qwen2
        size: 1.5b
        metrics:
          - likelihood
          - distribution_drift
          - rag
          - agent
      - id: Qwen/Qwen2.5-3B-Instruct
        family: qwen2
        size: 3b
        metrics:
          - generation
          - rag
          - json_schema
      - id: microsoft/Phi-4-mini-instruct
        family: phi
        metrics:
          - structured_output
          - tool_calls
          - agent
      - id: meta-llama/Llama-3.2-3B-Instruct
        family: llama
        size: 3b
        metrics:
          - structured_output
          - tool_calls
          - agent

  long_context:
    default: microsoft/Phi-3-mini-128k-instruct
    models:
      - id: microsoft/Phi-3-mini-128k-instruct
        family: phi3
        context: 128k
        metrics:
          - sliding_window_ppl
          - position_bucketed_ppl
          - lost_in_middle
          - distractor_sensitivity
      - id: microsoft/Phi-3-medium-128k-instruct
        family: phi3
        context: 128k
        metrics:
          - long_context_regression
          - distractor_sensitivity
      - id: Qwen/Qwen2.5-7B-Instruct
        family: qwen2
        size: 7b
        metrics:
          - rag
          - generation_quality
          - quantization_drift

rag_support:
  embeddings:
    - BAAI/bge-small-en-v1.5
    - sentence-transformers/all-MiniLM-L12-v2
  rerankers:
    - cross-encoder/ms-marco-MiniLM-L6-v2

export_variants:
  eval_logits:
    task: text-generation
    weight_format: fp16
    backend: optimum-openvino
  eval_logits_int4:
    task: text-generation
    weight_format: int4
    backend: optimum-openvino
  genai_generation:
    task: text-generation-with-past
    weight_format: int8
    backend: openvino-genai
  genai_generation_int4:
    task: text-generation-with-past
    weight_format: int4
    backend: openvino-genai

device_policy:
  unit_tests: cpu_or_dummy_only
  metric_verification_target_file: null
