name: Docs

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project and docs dependencies
        run: uv sync --extra dev

      - name: Generate docs reference artifacts
        run: |
          uv run python scripts/docs/build_cli_reference.py
          uv run python scripts/docs/build_schema_docs.py
          uv run python scripts/docs/build_api_pages.py
          uv run python scripts/docs/build_example_bundles.py

      - name: Build docs strictly
        run: uv run mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mkdocs-site
          path: site/
          if-no-files-found: ignore
          retention-days: 14
