name: Docs Preview

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/docs/**"
      - "mkdocs.yml"
      - ".readthedocs.yaml"
      - "src/oviqs/contracts/**"
      - "src/oviqs/interfaces/cli/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build preview artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project and docs dependencies
        run: uv sync --extra dev

      - name: Generate docs reference artifacts
        run: |
          uv run python scripts/docs/build_cli_reference.py
          uv run python scripts/docs/build_schema_docs.py
          uv run python scripts/docs/build_api_pages.py
          uv run python scripts/docs/build_example_bundles.py

      - name: Build preview strictly
        run: uv run mkdocs build --strict

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: site/
          if-no-files-found: error
          retention-days: 7
