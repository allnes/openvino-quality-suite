name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  quality:
    name: Full pre-commit quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project and dev dependencies
        run: uv sync --extra dev

      - name: Run full pre-commit suite
        run: |
          set -o pipefail
          uv run pre-commit run --all-files --show-diff-on-failure 2>&1 | tee precommit.log

      - name: Upload pre-commit log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: precommit-log
          path: precommit.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload package distributions
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-dist
          path: dist/*
          if-no-files-found: ignore
          retention-days: 14

  tests-matrix:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: contracts
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install project and dev dependencies
        run: uv sync --extra dev

      - name: Run pytest compatibility matrix
        run: uv run pytest -q

  contracts:
    name: Contract tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project and dev dependencies
        run: uv sync --extra dev

      - name: Run reporting contract tests
        run: |
          set -o pipefail
          uv run pytest tests/contracts -q 2>&1 | tee contracts.log

      - name: Upload contract test log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-tests-log
          path: contracts.log
          if-no-files-found: ignore
          retention-days: 14
