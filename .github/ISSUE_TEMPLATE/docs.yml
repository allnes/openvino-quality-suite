name: Documentation issue
description: Report missing, stale or unclear documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Link or path to the affected documentation.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is wrong or missing?
    validations:
      required: true
