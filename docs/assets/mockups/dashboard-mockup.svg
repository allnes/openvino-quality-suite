  <text x="72" y="112" font-family="Arial, sans-serif" font-size="16" fill="#52606d">Overall status: unknown</text>
  <rect x="48" y="164" width="264" height="140" rx="8" fill="#ffffff" stroke="#c7ccd1"/>
